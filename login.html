<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LARANA Glasses</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="login-container">

        <!-- LEFT IMAGE -->
        <div class="login-left">
            <div class="overlay"></div>

            <div class="brand">
                <h1>LARANA</h1>
                <p>Luxury Eyewear Collection</p>
            </div>

            <div class="left-content">
                <h2>See The World In Style</h2>
                <p>
                    Khám phá bộ sưu tập kính cao cấp dành riêng cho phong cách của bạn.
                </p>
            </div>
        </div>

        <!-- RIGHT FORM -->
        <div class="login-right">

            <form class="login-box" onsubmit="return login(event)">

                <h2 align="center">Đăng nhập</h2>
                <p class="sub" align="center">Chào mừng bạn quay trở lại</p>

                <div class="input-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" id="user" placeholder="Nhập tên đăng nhập">
                </div>

                <div class="input-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu">
                </div>

                <div class="extra">
                    <label>
                        <input type="checkbox"> Ghi nhớ đăng nhập
                    </label>

                    <a href="#">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-login">
                    Đăng nhập
                </button>

                <div class="divider">
                    <span>hoặc</span>
                </div>

                <button type="button" class="btn-google">
                    Đăng nhập với Google
                </button>

                <p class="register-text">
                    Chưa có tài khoản?
                    <a href="register.html">Đăng ký ngay</a>
                </p>

            </form>

        </div>

    </div>
    <script src="auth.js"></script>
</body>

</html>
