<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <!-- Logo + tiêu đề -->
    <div class="header">
        <img src="logo.png" alt="VNSTEEL" class="logo">
        
    </div>

    <!-- Form -->
    <div class="login-box">
    <h2>Thông tin reset mật khẩu</h2>

    <input type="text" placeholder="Nhập tài khoản">

    <div class="action-buttons">
        <button class="skip">Bỏ qua</button>
        <button class="confirm">Xác nhận</button>
    </div>

    <button class="login-full">Đăng nhập</button>
</div>
</div>

</body>
</html>
